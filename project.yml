name: OcrServerLegacy
options:
  bundleIdPrefix: site.riddleling.app
  deploymentTarget:
    iOS: "12.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

targets:
  OcrServerLegacy:
    type: application
    platform: iOS
    sources:
      - path: OcrServerLegacy
        excludes:
          - "*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: site.riddleling.app.OcrServerLegacy
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OcrServerLegacy/Info.plist
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "12.0"
        PRODUCT_NAME: "OCR Server"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "NO"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: "YES"
    info:
      path: OcrServerLegacy/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        CFBundleDisplayName: "OCR Server"
        NSCameraUsageDescription: "Used to capture images for OCR."
